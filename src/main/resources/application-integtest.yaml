server:
  port: 0
  shutdown: immediate

spring:
  datasource:
    hikari:
      jdbc-url: jdbc:h2:mem:obitus_integtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    clean-disabled: false
    enabled: true
    locations: classpath:db/migration-h2

base_url: "http://localhost:8080/"
base_url_external: "http://localhost:8080/"
